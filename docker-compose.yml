services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    networks:
      - music-net
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${MEDIA_PATH}/portainer_data:/data
    ports:
      - 9443:9443

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    networks:
      - music-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    volumes:
      - ${MEDIA_PATH}/jellyfin/config:/config
      - ${MEDIA_PATH}/media:/media
    ports:
      - 8096:8096
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    networks:
      - music-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
      - WEBUI_PORT=8080
    volumes:
      - ${MEDIA_PATH}/qbittorrent/config:/config
      - ${MEDIA_PATH}/downloads:/downloads
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    networks:
      - music-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
      - SLSKD_REMOTE_CONFIGURATION=true
    volumes:
      - ${MEDIA_PATH}/slskd/config:/app/config
      - ${MEDIA_PATH}/downloads:/downloads
    ports:
      - 5030:5030
      - 50300:50300
    restart: unless-stopped

  shelfmark:
    image: ghcr.io/calibrain/shelfmark:latest
    container_name: shelfmark
    networks:
      - music-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    ports:
      - 8084:8084
    volumes:
      - ${MEDIA_PATH}/shelfmark/config:/config
      - ${MEDIA_PATH}/media/books:/books
    restart: unless-stopped

networks:
  music-net:
    driver: bridge
