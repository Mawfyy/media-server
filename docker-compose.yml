services:
  # --- ADMINISTRACIÓN ---
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    networks:
      - music-net
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro # Permite a Portainer ver tus otros contenedores
      - ./portainer_data:/data # Guarda tus usuarios y configuraciones de Portainer
    ports:
      - 9443:9443 # Interfaz Web Segura (HTTPS)
    # Nota: La primera vez que entres te pedirá crear un admin

  # --- MEDIA & DOWNLOADS ---
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    networks:
      - music-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    volumes:
      - ./jellyfin/config:/config
      - /home/mawfy/Projects/music-server/media:/media
      - /home/mawfy/Projects/music-server/downloads:/downloads
    ports:
      - 8096:8096
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    networks:
      - music-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent/config:/config
      - /home/mawfy/Projects/music-server/downloads:/downloads
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    networks:
      - music-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
      - SLSKD_REMOTE_CONFIGURATION=true
    volumes:
      - ./slskd/config:/app/config
      - /home/mawfy/Projects/music-server/downloads/soulseek:/app/downloads
    ports:
      - 5030:5030
      - 50300:50300
    restart: unless-stopped

networks:
  music-net:
    driver: bridge