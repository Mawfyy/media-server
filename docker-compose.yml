services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    networks:
      - music-net
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${MEDIA_PATH}/portainer_data:/data
    ports:
      - 9443:9443

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    networks:
      - music-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    volumes:
      - ${MEDIA_PATH}/jellyfin/config:/config
      - ${MEDIA_PATH}/media:/media
    ports:
      - 8096:8096
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    networks:
      - music-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
      - WEBUI_PORT=8080
    volumes:
      - ${MEDIA_PATH}/qbittorrent/config:/config
      - ${MEDIA_PATH}/downloads:/downloads
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    networks:
      - music-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
      - SLSKD_REMOTE_CONFIGURATION=true
    volumes:
      - ${MEDIA_PATH}/slskd/config:/app/config
      - ${MEDIA_PATH}/downloads:/downloads
    ports:
      - 5030:5030
      - 50300:50300
    restart: unless-stopped

  shelfmark:
    image: ghcr.io/calibrain/shelfmark:latest
    container_name: shelfmark
    networks:
      - music-net
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    ports:
      - 8084:8084
    volumes:
      - ${MEDIA_PATH}/shelfmark/config:/config
      - ${MEDIA_PATH}/media/books:/books
    restart: unless-stopped
    
  # Self-hosted Git Service (Forgejo)
  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    container_name: forgejo
    networks:
      - music-net
    environment:
      - USER_UID=1000
      - USER_GID=1000
    volumes:
      - ${MEDIA_PATH}/forgejo/data:/data:Z
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "2222:22" # Port for SSH git clones
    restart: unless-stopped

  # Cloud Storage (Nextcloud)
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    networks:
      - music-net
    depends_on:
      - nextcloud-db
    environment:
      - MYSQL_PASSWORD=nextcloud_db_password
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=nextcloud-db
    volumes:
      - ${MEDIA_PATH}/nextcloud/data:/var/www/html:Z
    ports:
      - "8081:80" # Moved to 8081 to avoid conflict with qBittorrent (8080)
    restart: unless-stopped

  # Database for Nextcloud
  nextcloud-db:
    image: mariadb:10.6
    container_name: nextcloud-db
    networks:
      - music-net
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    environment:
      - MYSQL_ROOT_PASSWORD=root_db_password
      - MYSQL_PASSWORD=nextcloud_db_password
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
    volumes:
      - ${MEDIA_PATH}/nextcloud/db:/var/lib/mysql:Z
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    networks:
      - music-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${MEDIA_PATH}/nginx/conf:/etc/nginx/conf.d
      - ${MEDIA_PATH}/nginx/certs:/etc/nginx/certs
    restart: unless-stopped

networks:
  music-net:
    driver: bridge
